<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Facility Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
:root {
  /* Roland Garros palette — clay terracotta + court green + cream */
  --bg: #F4EFE2;            /* cream */
  --surface: #FFFBF0;
  --surface-2: #EFE8D4;
  --ink: #1E2A1A;            /* deep court green-black */
  --ink-2: #2F3E2A;
  --ink-3: #5C6A54;
  --ink-4: #8F9B85;
  --line: #D9D0B8;
  --line-2: #E4DCC5;
  --accent: #C85A2E;         /* clay terracotta */
  --accent-soft: #F5DCCC;
  --ok: #2E5D3A;             /* court green */
  --ok-soft: #D3E3C8;
  --warn: #B47A12;           /* sunset amber */
  --warn-soft: #F2E3BF;
  --danger: #8A2B1E;
  --danger-soft: #F1D9CF;
  --info: #2D4E6B;
  --info-soft: #DBE4EC;

  --radius: 3px;
  --radius-lg: 5px;
  --row-h: 44px;
  --ff-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --ff-mono: 'IBM Plex Mono', ui-monospace, monospace;
  --ff-serif: 'Instrument Serif', Georgia, serif;
}

[data-theme="dark"] {
  --bg: #111110;
  --surface: #1A1A18;
  --surface-2: #181816;
  --ink: #F2EEE2;
  --ink-2: #D7D2C2;
  --ink-3: #A29D8B;
  --ink-4: #6F6B5E;
  --line: #2A2925;
  --line-2: #242320;
  --accent: #E07A3E;
  --accent-soft: #3A2416;
  --ok-soft: #1A2821;
  --warn-soft: #2A2413;
  --danger-soft: #2A1814;
  --info-soft: #1B242D;
}

[data-density="compact"] {
  --row-h: 36px;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--ff-sans);
  font-size: 13.5px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
}

button { font: inherit; color: inherit; cursor: pointer; }
input, select, textarea { font: inherit; color: inherit; }

/* ---------- LAYOUT ---------- */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  grid-template-rows: 52px 1fr;
  height: 100vh;
  min-height: 680px;
}
.topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 16px 0 18px;
  border-bottom: 1px solid var(--line);
  background: var(--surface);
  z-index: 10;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  width: 214px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.brand-mark {
  width: 22px; height: 22px;
  background: var(--accent);
  position: relative;
  border-radius: 3px;
}
.brand-mark::before, .brand-mark::after{
  content:""; position:absolute; background: var(--surface);
}
.brand-mark::before { left:4px; top:4px; width:5px; height:14px; }
.brand-mark::after  { left:13px; top:4px; width:5px; height:9px; }
.brand-name { font-size: 13.5px; }
.brand-sub { color: var(--ink-3); font-family: var(--ff-mono); font-size: 10.5px; letter-spacing: .02em; text-transform: uppercase; margin-left: 6px;}

.topbar-spacer { flex: 1; }
.facility-switch {
  display: inline-flex; align-items: center; gap: 8px;
  height: 32px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 0 10px 0 10px;
  background: var(--surface-2);
  cursor: pointer;
  font-size: 12.5px;
}
.facility-switch .chev { color: var(--ink-4); }
.facility-switch .dot { width:6px; height:6px; background: var(--ok); border-radius: 50%; }

.cmdk {
  display: inline-flex; align-items: center; gap: 8px;
  height: 32px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-2);
  color: var(--ink-3);
  min-width: 280px;
  cursor: pointer;
  font-size: 12.5px;
}
.cmdk kbd {
  margin-left: auto;
  font-family: var(--ff-mono);
  font-size: 10.5px;
  color: var(--ink-3);
  background: var(--bg);
  border: 1px solid var(--line);
  padding: 1px 6px;
  border-radius: 3px;
}
.icon-btn {
  height: 32px; width: 32px;
  display: inline-grid; place-items: center;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-2);
  color: var(--ink-2);
}
.icon-btn:hover { border-color: var(--ink-4); }
.avatar {
  height: 28px; width: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #4a3f2a, #8b7c5a);
  color: #fbf6e9;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600;
}

/* sidebar */
.sidebar {
  border-right: 1px solid var(--line);
  background: var(--surface);
  padding: 14px 10px;
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.nav-section { margin-bottom: 18px; }
.nav-section h5 {
  font-size: 10px;
  font-family: var(--ff-mono);
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink-4);
  margin: 0 10px 6px;
  font-weight: 500;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 10px;
  border-radius: var(--radius);
  color: var(--ink-2);
  font-size: 13px;
  cursor: pointer;
  user-select: none;
  position: relative;
}
.nav-item:hover { background: var(--surface-2); }
.nav-item.active { background: var(--ink); color: var(--bg); }
.nav-item.active .nav-count { color: var(--bg); opacity: .7; }
.nav-item .nav-count {
  margin-left: auto; font-family: var(--ff-mono); font-size: 11px; color: var(--ink-4);
}
.nav-item .ico { width:14px; height:14px; color: currentColor; opacity: .8; }

.fac-pill {
  display:flex; align-items:center; gap: 8px;
  padding: 5px 10px;
  font-size: 12px;
  color: var(--ink-2);
  border-radius: var(--radius);
  cursor: pointer;
}
.fac-pill:hover { background: var(--surface-2); }
.fac-pill.active { color: var(--ink); font-weight: 500; }
.fac-pill .fac-code {
  font-family: var(--ff-mono); font-size: 10.5px; color: var(--ink-4);
  background: var(--bg); border: 1px solid var(--line);
  padding: 1px 5px; border-radius: 3px;
}
.fac-pill.active .fac-code { background: var(--accent-soft); border-color: var(--accent-soft); color: var(--accent); }

/* main */
.main {
  overflow: auto;
  background: var(--bg);
}
.page {
  padding: 28px 32px 48px;
  max-width: 1440px;
  margin: 0 auto;
}
.page-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 20px;
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}
.page-head > div:last-child { flex-shrink: 0; padding-top: 4px; }
.eyebrow {
  font-family: var(--ff-mono);
  font-size: 10.5px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 6px;
  display: flex; gap: 10px; align-items: center;
}
.eyebrow .bullet { width:4px; height:4px; background: var(--accent); border-radius:50%; }
.page-title {
  font-family: var(--ff-serif);
  font-weight: 400;
  font-size: 34px;
  line-height: 1.08;
  letter-spacing: -0.01em;
  margin: 0;
}
.page-subtitle {
  color: var(--ink-3);
  font-size: 13px;
  margin-top: 10px;
}
.detail-title {
  font-size: 24px !important;
  line-height: 1.3 !important;
  margin-bottom: 14px !important;
  display: block !important;
}
.detail-title + div { clear: both; }

/* cards */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
}
.card-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line-2);
}
.card-head h3 {
  margin: 0;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
}
.card-head .sub {
  font-family: var(--ff-mono); font-size: 10.5px;
  color: var(--ink-4); letter-spacing: .04em; text-transform: uppercase;
}
.card-body { padding: 14px 16px; }
.card-body.flush { padding: 0; }

/* buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 12px;
  border: 1px solid var(--line);
  background: var(--surface-2);
  border-radius: var(--radius);
  font-size: 12.5px; font-weight: 500;
  color: var(--ink);
}
.btn:hover { border-color: var(--ink-4); }
.btn.primary {
  background: var(--ink); color: var(--bg); border-color: var(--ink);
}
.btn.primary:hover { background: #000; }
.btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
.btn.ghost:hover { background: var(--surface-2); }
.btn.sm { height: 26px; padding: 0 10px; font-size: 11.5px; }

/* tables */
.tbl { width: 100%; border-collapse: collapse; }
.tbl thead th {
  position: sticky; top: 0;
  text-align: left;
  font-size: 10.5px;
  font-family: var(--ff-mono);
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--surface);
  white-space: nowrap;
}
.tbl tbody td {
  padding: 0 14px;
  height: var(--row-h);
  border-bottom: 1px solid var(--line-2);
  font-size: 12.5px;
  vertical-align: middle;
  white-space: nowrap;
}
.tbl tbody tr { cursor: pointer; }
.tbl tbody tr:hover { background: var(--surface-2); }
.tbl tbody tr.selected { background: var(--accent-soft); }
.tbl .num, .tbl .mono { font-family: var(--ff-mono); font-size: 11.5px; }
.tbl .right { text-align: right; }
.tbl .muted { color: var(--ink-3); }
.tbl .primary-col { color: var(--ink); font-weight: 500; }

/* chips/status */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 8px;
  font-size: 11px;
  font-family: var(--ff-mono);
  letter-spacing: .03em;
  border-radius: 100px;
  border: 1px solid transparent;
  text-transform: uppercase;
  white-space: nowrap;
}
.chip .dot { width:6px; height:6px; border-radius: 50%; background: currentColor; }
.chip.ok { background: var(--ok-soft); color: var(--ok); }
.chip.warn { background: var(--warn-soft); color: var(--warn); }
.chip.danger { background: var(--danger-soft); color: var(--danger); }
.chip.info { background: var(--info-soft); color: var(--info); }
.chip.ink { background: var(--bg); color: var(--ink-2); border-color: var(--line);}
.chip.accent { background: var(--accent-soft); color: var(--accent); }

/* stat block */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface);}
.kpi {
  padding: 16px 18px;
  border-right: 1px solid var(--line-2);
  position: relative;
}
.kpi:last-child { border-right: none; }
.kpi .label {
  font-family: var(--ff-mono); font-size: 10.5px;
  color: var(--ink-3); letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.kpi .value {
  font-family: var(--ff-serif);
  font-size: 36px; line-height: 1; font-weight: 400;
  letter-spacing: -0.01em;
}
.kpi .delta { font-size: 11.5px; color: var(--ink-3); margin-top: 8px;}
.kpi .delta .up { color: var(--ok); }
.kpi .delta .down { color: var(--accent); }

/* timeline renewals */
.timeline {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
}
.tl-row {
  display: grid;
  grid-template-columns: 90px 1fr 88px;
  gap: 12px;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--line-2);
  cursor: pointer;
}
.tl-row:hover { background: var(--surface-2); }
.tl-row:last-child { border-bottom: none; }
.tl-row .when { font-family: var(--ff-mono); font-size: 11px; color: var(--ink-3); }
.tl-row .when .big { display: block; color: var(--ink); font-size: 13px; font-weight: 500; letter-spacing: -.01em; }
.tl-row .title { font-weight: 500; font-size: 13px; }
.tl-row .meta { font-size: 11.5px; color: var(--ink-3); font-family: var(--ff-mono); margin-top: 2px; }
.tl-row .days { text-align: right; font-family: var(--ff-mono); font-size: 11px; color: var(--ink-3);}
.tl-row .days .n { display:block; font-size: 16px; color: var(--ink); font-weight: 500;}
.tl-row.urgent .days .n { color: var(--accent); }
.tl-row.warn .days .n { color: var(--warn); }

/* alerts list */
.alert {
  display: grid;
  grid-template-columns: 8px 1fr auto;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line-2);
  align-items: start;
}
.alert:last-child { border-bottom: none; }
.alert .bar { width:3px; height: 100%; background: var(--ink-4); border-radius: 2px; min-height: 28px; }
.alert.danger .bar { background: var(--accent); }
.alert.warn .bar { background: var(--warn); }
.alert.info .bar { background: var(--info); }
.alert .head { font-weight: 500; font-size: 13px; }
.alert .body { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
.alert .meta { font-family: var(--ff-mono); font-size: 10.5px; color: var(--ink-4); margin-top: 4px; letter-spacing: .03em; text-transform: uppercase; }

/* filter bar */
.filter-bar {
  display: flex; gap: 8px; align-items: center; margin-bottom: 14px;
  flex-wrap: wrap;
}
.search-input {
  display: flex; align-items: center; gap: 8px;
  height: 34px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 0 10px;
  flex: 1; min-width: 260px;
}
.search-input input {
  border: none; outline: none; background: transparent; width: 100%;
  font-size: 13px;
}
.search-input input::placeholder { color: var(--ink-4); }
.filter-pill {
  display: inline-flex; align-items: center; gap: 6px;
  height: 34px; padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  font-size: 12.5px;
  color: var(--ink-2);
  cursor: pointer;
}
.filter-pill .lab {
  font-family: var(--ff-mono); font-size: 10.5px; color: var(--ink-4); text-transform: uppercase; letter-spacing: .06em;
}
.filter-pill:hover { border-color: var(--ink-4); }
.filter-pill.active { border-color: var(--ink); }
.filter-pill .x { color: var(--ink-4); margin-left: 2px; }

/* detail split view */
.split {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 20px;
  height: calc(100vh - 52px - 28px - 48px - 90px);
  min-height: 600px;
}
.doc-pane {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.doc-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--line-2);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--surface-2);
  font-family: var(--ff-mono); font-size: 11px; color: var(--ink-3);
}
.doc-body {
  flex: 1; overflow: auto;
  background: #ECEAE1;
  padding: 24px;
  display: flex; flex-direction: column; align-items: center;
  gap: 16px;
}
.doc-page {
  width: 100%; max-width: 520px;
  min-height: 680px;
  background: #fff;
  border: 1px solid #d7d2c2;
  box-shadow: 0 1px 2px rgba(20,19,15,0.04), 0 8px 24px rgba(20,19,15,0.06);
  padding: 40px 44px;
  font-size: 11.5px;
  line-height: 1.55;
  color: #2a2620;
  font-family: var(--ff-sans);
  position: relative;
}
.doc-page h2 { font-size: 15px; margin: 0 0 6px; font-weight: 600; letter-spacing: .01em; text-transform: uppercase;}
.doc-page h3 { font-size: 12px; margin: 18px 0 6px; font-weight: 600; }
.doc-page p { margin: 0 0 8px; }
.doc-page .date { color: #6b6759; font-size: 10.5px; font-family: var(--ff-mono); margin-bottom: 16px;}
.hl { background: #FBE8D8; padding: 1px 3px; border-radius: 2px; position: relative; cursor: pointer;}
.hl:hover { background: #F6D6B8; }
.hl.active { background: #C4541A; color: #fff; }

.ext-pane {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.ext-tabs {
  display: flex;
  border-bottom: 1px solid var(--line-2);
  background: var(--surface-2);
  padding: 0 8px;
}
.ext-tab {
  padding: 10px 12px;
  font-size: 12px;
  border-bottom: 2px solid transparent;
  color: var(--ink-3);
  cursor: pointer;
  font-weight: 500;
}
.ext-tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.ext-body { flex: 1; overflow: auto; }

.field-row {
  display: grid;
  grid-template-columns: 160px 1fr 80px;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--line-2);
  align-items: start;
}
.field-row:hover { background: var(--surface-2); }
.field-row .lab {
  font-family: var(--ff-mono); font-size: 10.5px;
  color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em;
  padding-top: 2px;
}
.field-row .val { font-size: 12.5px; }
.field-row .val input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px dashed transparent;
  padding: 2px 0;
  font-size: 12.5px;
  outline: none;
}
.field-row .val input:focus { border-bottom-color: var(--accent); }
.field-row:hover .val input { border-bottom-color: var(--line); }
.conf {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--ff-mono); font-size: 10px;
  color: var(--ink-3);
  justify-content: flex-end;
}
.conf-bar {
  width: 40px; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden;
}
.conf-bar span { display: block; height: 100%; background: var(--ok); }
.conf.med .conf-bar span { background: var(--warn); }
.conf.low .conf-bar span { background: var(--accent); }

/* upload modal */
.modal-scrim {
  position: fixed; inset: 0;
  background: rgba(20,19,15,0.35);
  display: grid; place-items: center;
  z-index: 100;
  backdrop-filter: blur(2px);
}
.modal {
  width: 880px; max-width: calc(100vw - 32px);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: 0 30px 80px rgba(20,19,15,0.25);
  overflow: hidden;
  max-height: calc(100vh - 64px);
  display: flex; flex-direction: column;
}
.modal-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center;
}
.modal-head h2 {
  margin: 0; font-size: 15px; font-weight: 600;
}
.modal-body { padding: 18px; overflow: auto; }
.dropzone {
  border: 1.5px dashed var(--line);
  border-radius: var(--radius-lg);
  padding: 40px 24px;
  text-align: center;
  background: var(--surface-2);
  transition: all .15s ease;
}
.dropzone.dragging { border-color: var(--accent); background: var(--accent-soft);}
.dropzone .big {
  font-family: var(--ff-serif); font-size: 22px;
  margin-bottom: 6px;
}
.dropzone .sub { color: var(--ink-3); font-size: 12.5px; }
.dropzone .types {
  display: inline-flex; gap: 8px; margin-top: 14px;
  flex-wrap: wrap; justify-content: center;
}

.upload-item {
  display: grid;
  grid-template-columns: 24px 1fr auto;
  gap: 12px;
  padding: 10px 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  margin-bottom: 8px;
  align-items: center;
  background: var(--surface);
}
.upload-item .name { font-weight: 500; font-size: 12.5px; }
.upload-item .meta { font-family: var(--ff-mono); font-size: 10.5px; color: var(--ink-3); margin-top: 2px; }
.upload-item .bar {
  height: 3px; background: var(--line); border-radius: 2px; overflow: hidden; margin-top: 6px;
}
.upload-item .bar span {
  display: block; height: 100%; background: var(--accent);
  transition: width .25s ease;
}

/* charts */
.bar-chart {
  display: grid;
  grid-template-columns: 120px 1fr 50px;
  gap: 10px; align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--line-2);
  font-size: 12px;
}
.bar-chart:last-child { border-bottom: none; }
.bar-chart .track {
  height: 10px; background: var(--surface-2); border: 1px solid var(--line-2); border-radius: 2px;
  position: relative; overflow: hidden;
}
.bar-chart .fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--ink);
}
.bar-chart.accent .fill { background: var(--accent); }
.bar-chart .val { font-family: var(--ff-mono); font-size: 11px; text-align: right;}
.bar-chart .lab { font-size: 12px; }

/* tweaks panel */
.tweaks-fab {
  position: fixed; right: 18px; bottom: 18px;
  height: 42px; padding: 0 16px;
  border-radius: 100px;
  background: var(--ink); color: var(--bg);
  border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
  font-weight: 500; font-size: 12.5px;
  box-shadow: 0 10px 30px rgba(20,19,15,0.25);
  z-index: 90;
}
.tweaks-panel {
  position: fixed; right: 18px; bottom: 70px;
  width: 300px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 14px;
  z-index: 91;
  box-shadow: 0 20px 60px rgba(20,19,15,0.18);
}
.tweaks-panel h4 { margin: 0 0 10px; font-size: 12px; font-weight: 600; letter-spacing: -0.005em; display: flex; justify-content: space-between; align-items:center; }
.tweaks-panel h4 .x { color: var(--ink-4); cursor: pointer; font-size: 16px; }
.tweak {
  margin-bottom: 12px;
}
.tweak .lab { font-family: var(--ff-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px;}
.seg {
  display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
  border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden;
}
.seg button {
  background: var(--surface); border: none; border-right: 1px solid var(--line-2);
  padding: 6px 8px; font-size: 11.5px; color: var(--ink-3); cursor: pointer;
}
.seg button:last-child { border-right: none; }
.seg button.active { background: var(--ink); color: var(--bg); }

/* misc */
.break-col { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
.stack-14 > * + * { margin-top: 14px; }
.stack-20 > * + * { margin-top: 20px; }

.dot-row { display: inline-flex; align-items: center; gap: 4px; }
.dot-row .tick {
  width: 3px; height: 12px; background: var(--line); border-radius: 1px;
}
.dot-row .tick.on { background: var(--accent); }

.kbd-hint {
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--ink-4);
}

.section-title {
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin: 24px 0 10px;
}

.counterparty-avatar {
  width: 22px; height: 22px;
  border-radius: 3px;
  background: var(--bg);
  border: 1px solid var(--line);
  display: inline-grid; place-items: center;
  font-family: var(--ff-mono);
  font-size: 10px;
  color: var(--ink-2);
  font-weight: 600;
  margin-right: 6px;
  vertical-align: middle;
}

/* breadcrumb */
.crumb {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--ff-mono); font-size: 10.5px;
  color: var(--ink-3);
  text-transform: uppercase; letter-spacing: .05em;
  margin-bottom: 14px;
}
.crumb a { color: var(--ink-2); text-decoration: none; cursor: pointer; }
.crumb a:hover { color: var(--ink); }
.crumb .sep { color: var(--ink-4); }

/* obligations */
.oblig-row {
  display: grid;
  grid-template-columns: 16px 1fr auto auto;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--line-2);
  align-items: center;
}
.oblig-row:last-child { border-bottom: none; }
.oblig-row .check {
  width: 14px; height: 14px;
  border: 1.5px solid var(--line);
  border-radius: 3px;
  cursor: pointer;
  background: var(--surface);
}
.oblig-row .check.done { background: var(--ok); border-color: var(--ok); }
.oblig-row.done .title { color: var(--ink-4); text-decoration: line-through; }
.oblig-row .title { font-size: 13px; font-weight: 500;}
.oblig-row .due { font-family: var(--ff-mono); font-size: 11px; color: var(--ink-3); }

/* scrollbar refinement */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }
::-webkit-scrollbar-track { background: transparent; }

/* premium lock */
.premium-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--ff-mono); font-size: 9.5px;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 2px 6px;
  background: var(--ink); color: var(--bg);
  border-radius: 2px;
}
.locked {
  position: relative;
}
.locked::after {
  content: "";
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent 0 8px,
    rgba(20,19,15,0.025) 8px 16px
  );
  pointer-events: none;
}
.lock-overlay {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  background: linear-gradient(180deg, rgba(246,245,241,0) 0%, rgba(246,245,241,0.9) 60%, var(--bg) 100%);
  pointer-events: none;
}
.lock-overlay .inner {
  pointer-events: auto;
  text-align: center;
}

</style>
</head>
